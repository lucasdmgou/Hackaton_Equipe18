<!DOCTYPE html>
<html lang="pt-BR" class="game-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma/css/bulma.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="game-body">
    <section class="section page-bg game-page">
        <div class="container">
            <div class="game-layout">
                <div class="game-hud box">
                    <div>
                        <p class="heading">Sala</p>
                        <strong id="room-code">----</strong>
                    </div>

                    <div>
                        <p class="heading">Vidas</p>
                        <strong id="player-hearts">❤️❤️❤️</strong>
                    </div>

                    <div>
                        <p class="heading">Pontos</p>
                        <strong id="player-score">0</strong>
                    </div>

                    <a href="/lobby" class="button is-soft is-small">Sair</a>
                </div>

                <div class="question-panel box has-text-centered">
                    <div class="question-meta">
                        <p id="question-count" class="heading">Pergunta</p>
                        <p id="question-timer" class="question-timer">Tempo: --s</p>
                    </div>
                    <h1 id="question-text" class="title is-5">Carregando pergunta...</h1>
                    <p id="question-options" class="subtitle is-6"></p>
                    <p id="answer-helper" class="answer-helper">
                        Pise em uma área de resposta e pressione Espaço.
                    </p>
                </div>

                <div class="arena-wrapper box">
                    <canvas id="arena" width="480" height="320"></canvas>
                </div>

                <div class="box status-panel">
                    <p id="current-area">Área atual: nenhuma</p>
                    <p id="answer-feedback">Aguardando resposta...</p>
                    <p class="is-size-7">Use WASD ou setas para andar. Espa&ccedil;o confirma a resposta. F usa o empurr&atilde;o.</p>
                </div>
                <div id="score-toast" class="score-toast" aria-live="polite"></div>
            </div>
        </div>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/game.js"></script>
</body>
</html>
