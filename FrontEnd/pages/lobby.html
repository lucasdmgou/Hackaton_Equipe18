<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma/css/bulma.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <section class="section page-bg">
        <div class="container">
            <div class="has-text-centered mb-6">
                <h1 class="title is-2">Lobby</h1>
                <p class="subtitle">
                    Crie uma sala nova ou entre em uma sala existente.
                </p>
            </div>

            <div class="columns is-centered">
                <div class="column is-5">
                    <div class="box has-text-centered">
                        <h2 class="title is-4">Criar sala</h2>

                        <p class="mb-4">
                            Gere um código para convidar outros jogadores.
                        </p>

                        <a href="/questions" class="button is-field is-fullwidth is-medium mb-3">
                            Cadastrar perguntas
                        </a>

                        <form action="/rooms/create" method="POST">
                            <button class="button is-arena is-fullwidth is-medium" type="submit">
                                Criar nova sala
                            </button>
                        </form>
                    </div>
                </div>

                <div class="column is-5">
                    <div class="box">
                        <h2 class="title is-4 has-text-centered">Entrar em sala</h2>

                        <form action="/rooms/join" method="POST">
                            <div class="field">
                                <label class="label" for="code">Código da sala</label>

                                <div class="control">
                                    <input
                                        class="input is-medium has-text-centered"
                                        id="code"
                                        type="text"
                                        name="code"
                                        placeholder="Ex: A7KD"
                                        maxlength="4"
                                        required
                                    >
                                </div>
                            </div>

                            <button class="button is-field is-fullwidth is-medium mt-4" type="submit">
                                Entrar na sala
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="has-text-centered mt-5">
                <a href="/auth/logout" class="button is-soft">
                    Trocar apelido
                </a>
            </div>
        </div>
    </section>

    <script src="/js/background-music.js"></script>
</body>
</html>
